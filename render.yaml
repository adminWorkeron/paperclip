databases:
  - name: paperclip-db
    plan: free
    databaseName: paperclip
    user: paperclip

services:
  - type: web
    name: paperclip
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: paperclip-db
          property: connectionString
      - key: PORT
        value: "3100"
      - key: SERVE_UI
        value: "true"
      - key: NODE_ENV
        value: production
      - key: PAPERCLIP_DEPLOYMENT_MODE
        value: authenticated
      - key: PAPERCLIP_DEPLOYMENT_EXPOSURE
        value: public
